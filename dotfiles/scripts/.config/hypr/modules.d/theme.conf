# Theme management keybinds
bind = $mainMod, T, exec, hyprpunk-rofi-theme-select
bind = $mainMod SHIFT, T, exec, hyprpunk-theme-next
bind = $mainMod, W, exec, hyprpunk-rofi-wallpaper-select
bind = $mainMod SHIFT, W, exec, hyprpunk-wallpaper-next

# Wallpaper on login (swaybg doesn't persist across sessions)
exec-once = swaybg -i $HOME/.config/hypr/wallpapers/current -m fill

# Apply/refresh theme on login
exec-once = sleep 2 && HYPRPUNK_PATH=$HOME/.local/share/hyprpunk $HOME/.local/bin/hyprpunk-theme-refresh 2>/dev/null || true
