# Theme management keybinds
bind = $mainMod, T, exec, hawker-rofi-theme-select
bind = $mainMod SHIFT, T, exec, hawker-theme-next
bind = $mainMod, W, exec, hawker-rofi-wallpaper-select
bind = $mainMod SHIFT, W, exec, hawker-wallpaper-next

# Wallpaper on login (swaybg doesn't persist across sessions)
exec-once = swaybg -i $HOME/.config/hypr/wallpapers/current -m fill

# Apply/refresh theme on login
exec-once = sleep 2 && hawker-theme-refresh 2>/dev/null || true
