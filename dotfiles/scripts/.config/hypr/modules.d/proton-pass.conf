# Proton Pass SSH agent
# Fix kernel keyring permissions (NixOS sets wrong group on pass-cli keys)
exec-once = bash -c 'for key in $(keyctl search @s user "keyring:cli-local-key:*" 2>/dev/null); do keyctl setperm "$key" 0x3f3f0000 2>/dev/null; done'
exec-once = bash -c 'nohup pass-cli ssh-agent start > /tmp/proton-pass-agent.log 2>&1 &'
