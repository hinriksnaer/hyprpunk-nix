# Proton Pass SSH agent
# Uses keyctl session to work around NixOS kernel keyring group permissions bug
# (nixpkgs#497155: session keyring created with gid 65534/nogroup instead of user's group)
env = SSH_AUTH_SOCK,$HOME/.ssh/proton-pass-agent.sock
exec-once = bash -c 'nohup pass-cli ssh-agent start > /tmp/proton-pass-agent.log 2>&1 &'
