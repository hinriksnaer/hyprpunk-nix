# Miscellaneous Settings
# Various Hyprland behavior and cursor settings

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    anr_missed_pings = 3

    # Disable auto-reload to prevent CConfigWatcher errors with stow symlinks
    # Use hyprctl reload to apply config changes manually
    disable_autoreload = true

    # Debug Settings
    enable_swallow = true
    swallow_regex = ^(kitty|alacritty|foot)$
}

cursor {
    hide_on_key_press = true
    no_hardware_cursors = true
    default_monitor = HDMI-A-1
}

# Cursor theme (set explicitly so Hyprcursor doesn't load "")
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24

xwayland {
    force_zero_scaling = true
}

# Environment variables for Gum confirm prompts to match terminal theme
env = GUM_CONFIRM_PROMPT_FOREGROUND,6       # Cyan
env = GUM_CONFIRM_SELECTED_FOREGROUND,0     # Black
env = GUM_CONFIRM_SELECTED_BACKGROUND,2     # Green
env = GUM_CONFIRM_UNSELECTED_FOREGROUND,0   # Black
env = GUM_CONFIRM_UNSELECTED_BACKGROUND,8   # Dark grey
