# Core session setup (module-specific autostart is in modules.d/)

exec-once = dbus-update-activation-environment --systemd --all
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = bash -c 'command -v gsettings &>/dev/null && gsettings set org.gnome.desktop.interface color-scheme "prefer-dark" && gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"'
exec-once = nm-applet
