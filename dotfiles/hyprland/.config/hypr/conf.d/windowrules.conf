# Window Rules
# Application-specific window behaviors, floating rules, workspace assignments

# ================================
# Steam Fixes (XWayland dropdown menus)
# ================================
windowrule = stayfocused, title:^()$,class:^(steam)$
windowrule = minsize 1 1, title:^()$,class:^(steam)$

# ================================
# Floating Windows
# ================================

# System dialogs and popups
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save File)$
windowrule = float, title:^(Open Folder)$

# Authentication & settings
windowrule = float, class:^(polkit-gnome-authentication-agent-1)$
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(blueman-manager)$

# Bluetooth Manager (bluetui)
windowrule = float, class:^(floating-bluetui)$
windowrule = size 800 600, class:^(floating-bluetui)$

# Theme Selector (rofi-theme-select-preview)
windowrule = float, class:^(theme-selector-floating)$
windowrule = size 1400 900, class:^(theme-selector-floating)$
windowrule = center, class:^(theme-selector-floating)$

# Media players
windowrule = float, class:^(mpv)$
windowrule = float, title:^(Picture-in-Picture)$

# ================================
# Opacity Rules
# ================================

# Terminal transparency (also applies to yazi since it runs in kitty)
windowrule = opacity 0.95 0.85, class:^(kitty)$

# ================================
# Workspace Assignments
# ================================

# Browser on workspace 2
windowrule = workspace 2, class:^(firefox)$

# Communication apps on workspace 3
windowrule = workspace 3, class:^(discord)$
windowrule = workspace 3, class:^(Slack)$

# ================================
# Size & Position Rules
# ================================

# Center floating windows (except Steam popups which need to stay near their parent)
windowrule = center, floating:1, class:^(?!steam).*$

# ================================
# Misc Rules
# ================================

# Disable blur for certain apps (performance)
windowrule = noblur, class:^(firefox)$
windowrule = noblur, title:^(.*)(YouTube|Twitch|Netflix)(.*)$

# Keep these windows on top
windowrule = pin, title:^(Picture-in-Picture)$
