# Debug Configuration
# Hyprland debugging and logging settings

debug {
    disable_logs = false

    # Damage tracking (2 = full, needed for proper rendering)
    damage_tracking = 2

    # Disable verbose damage logging
    log_damage = false

    # Manual crash dumps
    manual_crash = false

    suppress_errors = false

    # Disable overlay debugging
    overlay = false

    # Disable damage blink
    damage_blink = false

    # Colored logs (only matters if logs enabled)
    colored_stdout_logs = true
}

# Environment variables
# env = HYPRLAND_NO_RT,1          # Uncomment to disable realtime scheduling (may cause input lag)
# env = HYPRLAND_NO_SD_NOTIFY,1   # Uncomment to disable systemd notify (may break service ordering)

# Debug environment variables (uncomment for debugging)
# env = HYPRLAND_LOG_WLR,1
# env = HYPRLAND_TRACE,1
# env = WAYLAND_DEBUG,1
# env = WLR_DRM_NO_ATOMIC,1
# env = WLR_NO_HARDWARE_CURSORS,1
