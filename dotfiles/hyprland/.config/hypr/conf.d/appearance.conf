# Visual appearance, layout, and behavior

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(ff6a1fee)
    col.inactive_border = rgba(595959aa)
    layout = master
}

decoration {
    rounding = 4
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.15

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 1
        new_optimizations = true
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = easeIn,0.42,0,1,1

    animation = global, 1, 10, default
    animation = border, 1, 15, easeIn
    animation = windows, 1, 5, easeOutQuint
    animation = windowsIn, 1, 4, easeOutQuint, popin 87%
    animation = windowsOut, 1, 2, linear, popin 87%
    animation = windowsMove, 1, 7, easeOutQuint
    animation = fadeIn, 1, 2, almostLinear
    animation = fadeOut, 1, 2, almostLinear
    animation = fade, 1, 3, quick
    animation = layers, 1, 3, easeOutQuint
    animation = layersIn, 1, 2, easeOutQuint, fade
    animation = layersOut, 1, 2, easeOutQuint, fade
    animation = fadeLayersIn, 1, 2, almostLinear
    animation = fadeLayersOut, 1, 2, almostLinear
    animation = workspaces, 0, 1, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
    mfact = 0.5
    orientation = center
    slave_count_for_center_master = 0
    center_master_fallback = right
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    disable_autoreload = false
    anr_missed_pings = 3
    enable_swallow = true
    swallow_regex = ^(kitty|alacritty|foot)$
}

cursor {
    no_hardware_cursors = true
    hide_on_key_press = true
    default_monitor = HDMI-A-1
}

xwayland {
    force_zero_scaling = true
}
