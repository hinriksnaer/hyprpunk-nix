# Hyprpunk NixOS - Hyprland Configuration
# Minimal single-file config for NixOS
# Old multi-file config backed up in conf.d.bak/

# ── Monitor ──────────────────────────────────────────────
monitor = HDMI-A-1, 7680x2160@120, auto, 1.5
monitor = , preferred, auto, 1

# ── Environment ──────────────────────────────────────────
env = PATH,$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

# Toolkit backends
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NIXOS_OZONE_WL,1
env = GTK_THEME,Adwaita:dark

# ── Input ────────────────────────────────────────────────
input {
    kb_layout = us,is
    kb_options = compose:caps
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0
}

# ── General ──────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(ff6a1fee)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# ── Decoration ───────────────────────────────────────────
decoration {
    rounding = 4
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.15

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 1
        new_optimizations = true
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
    }
}

# ── Animations ───────────────────────────────────────────
animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 1, default
}

# ── Layout ───────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
    mfact = 0.5
    orientation = center
    slave_count_for_center_master = 0
    center_master_fallback = right
}

# ── Misc ─────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    disable_autoreload = true
    anr_missed_pings = 3
    enable_swallow = true
    swallow_regex = ^(kitty|alacritty|foot)$
}

cursor {
    no_hardware_cursors = true
    hide_on_key_press = true
    default_monitor = HDMI-A-1
}

xwayland {
    force_zero_scaling = true
}

# ── Window rules ─────────────────────────────────────────
windowrule {
    name = file-dialogs
    match:title = ^(Open File|Save File|Open Folder)$
    float = true
}

windowrule {
    name = floating-utils
    match:class = ^(pavucontrol|nm-connection-editor|blueman-manager|mpv|polkit-gnome-authentication-agent-1)$
    float = true
}

windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = true
    pin = true
}

windowrule {
    name = kitty-opacity
    match:class = ^(kitty)$
    opacity = 0.95 0.85
}

windowrule {
    name = firefox-workspace
    match:class = ^(firefox)$
    workspace = 2
}

windowrule {
    name = comms-workspace
    match:class = ^(discord|Slack)$
    workspace = 3
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ── Keybinds ─────────────────────────────────────────────
$mainMod = SUPER

# Emergency exit
bind = CTRL ALT, BackSpace, exit,

# Applications
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Return, togglespecialworkspace, emergency
bind = $mainMod, B, exec, firefox
bind = $mainMod, E, exec, kitty -e yazi
bind = $mainMod, Space, exec, rofi -show drun

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, Escape, exec, hyprlock
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo,
bind = $mainMod ALT, R, togglesplit,
bind = $mainMod ALT, Space, exec, hyprctl keyword general:layout "$([ "$(hyprctl getoption general:layout -j | grep -o '"dwindle\|"master' | tr -d '"')" = "dwindle" ] && echo master || echo dwindle)"

# Focus (vim keys)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Focus (arrow keys)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod ALT, h, movewindow, l
bind = $mainMod ALT, l, movewindow, r
bind = $mainMod ALT, k, movewindow, u
bind = $mainMod ALT, j, movewindow, d

# Resize windows
bind = $mainMod CTRL, h, resizeactive, -50 0
bind = $mainMod CTRL, l, resizeactive, 50 0
bind = $mainMod CTRL, k, resizeactive, 0 -50
bind = $mainMod CTRL, j, resizeactive, 0 50

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Tab, workspace, previous
bind = $mainMod SHIFT, L, workspace, e+1
bind = $mainMod SHIFT, H, workspace, e-1

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move to workspace silently
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Media keys
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Keyboard layout
bind = $mainMod CTRL, Space, exec, hyprctl switchxkblayout all next

# ── Autostart ────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP GDK_BACKEND QT_QPA_PLATFORM SDL_VIDEODRIVER CLUTTER_BACKEND MOZ_ENABLE_WAYLAND QT_AUTO_SCREEN_SCALE_FACTOR QT_WAYLAND_DISABLE_WINDOWDECORATION GTK_THEME NIXOS_OZONE_WL
exec-once = bash -c 'command -v gsettings &>/dev/null && gsettings set org.gnome.desktop.interface color-scheme "prefer-dark" && gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"'
exec-once = bash -c 'nohup pass-cli ssh-agent start > /tmp/proton-pass-agent.log 2>&1 &'
exec-once = nm-applet
exec-once = waybar
exec-once = swaybg -i /home/softmax/hyprpunk-nix/dotfiles/themes/torrentz-hydra/backgrounds/1-torrentz-hydra.jpg.jpg -m fill
exec-once = sleep 2 && bash -c 'if [[ ! -f ~/.config/kitty/theme.conf ]]; then ~/.local/bin/hyprpunk-theme-set torrentz-hydra 2>/dev/null || true; fi; ~/.local/bin/hyprpunk-theme-refresh 2>/dev/null || true'
