name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Nix checks + script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Evaluate flake + run script tests
        run: |
          nix build .#checks.x86_64-linux.scripts --print-build-logs
          nix build .#checks.x86_64-linux.container-build --print-build-logs --no-link
          nix build .#checks.x86_64-linux.helion-build --print-build-logs --no-link

  vm-integration:
    name: NixOS VM integration tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            system-features = kvm

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run VM integration test
        run: nix build .#checks.x86_64-linux.vm-integration --print-build-logs

  build:
    name: Build NixOS configurations
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build desktop config
        run: nix build .#nixosConfigurations.desktop.config.system.build.toplevel --print-build-logs --no-link
